<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            color: purple;
            overflow: hidden;
        }

        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 40px;
            border: 2px solid purple;
            border-radius: 20px;
            box-shadow: 0 0 20px purple;
        }

        h1 {
            margin-bottom: 15px;
        }

        .highlight {
            font-weight: bold;
            color: #b56bff;
        }

        /* Duck images */
        .duck {
            width: 90px;
            height: 90px;
            position: absolute;
            border-radius: 10px;
            border: 2px solid purple;
        }

        .top-left {
            top: 10px;
            left: 10px;
        }

        .top-right {
            top: 10px;
            right: 10px;
        }

        .bottom-left {
            bottom: 10px;
            left: 10px;
        }

        .bottom-right {
            bottom: 10px;
            right: 10px;
        }
    </style>
</head>

<body>

    <!-- Ducks in corners -->
    <img class="duck top-left" src="https://placekitten.com/100/100" alt="duck">
    <img class="duck top-right" src="https://placekitten.com/101/100" alt="duck">
    <img class="duck bottom-left" src="https://placekitten.com/102/100" alt="duck">
    <img class="duck bottom-right" src="https://placekitten.com/103/100" alt="duck">

    <!-- Main card -->
    <div class="card">
        <h1>My Online Profile</h1>

        <p>Discord Username: <span class="highlight">duckbot_</span></p>
        <p>Roblox Username: <span class="highlight">jeef87604</span></p>

        <p style="margin-top: 20px; font-size: 12px; opacity: 0.7;">
            Built while learning HTML & CSS
        </p>
    </div>

</body>
</html>
