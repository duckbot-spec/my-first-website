<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>King of Oce</title>

<style>
    body {
        margin: 0;
        background: radial-gradient(circle, #000000, #050005);
        color: #b300ff;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* glowing title */
    h1 {
        text-align: center;
        margin-top: 20px;
        font-size: 60px;
        color: #d000ff;
        text-shadow: 0 0 10px #b300ff, 0 0 30px #8000ff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #b300ff; }
        to { text-shadow: 0 0 40px #ff00ff; }
    }

    /* info box */
    .info {
        text-align: center;
        margin-top: 10px;
        font-size: 18px;
        color: #d6a3ff;
    }

    .info span {
        display: block;
        margin: 5px;
    }

    /* duck images */
    .duck {
        width: 130px;
        height: 130px;
        position: absolute;
        object-fit: cover;
        border-radius: 15px;
        border: 2px solid #b300ff;
        box-shadow: 0 0 20px #b300ff;
    }

    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right { bottom: 10px; right: 10px; }

    /* floating effect */
    .duck {
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
</style>
</head>

<body>

<h1>👑 KING OF OCE 👑</h1>

<div class="info">
    <span>💬 Discord: duckbot_</span>
    <span>🎮 Roblox: jeef87604</span>
</div>

<!-- DUCKS -->
<img class="duck top-left" src="duck1.jpg">
<img class="duck top-right" src="duck2.jpg">
<img class="duck bottom-left" src="duck3.jpg">
<img class="duck bottom-right" src="duck4.jpg">

</body>
</html>
