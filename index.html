<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Duck Profile</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* glowing background effect */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(128,0,255,0.2), transparent);
    animation: pulse 4s infinite alternate;
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* center card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    padding: 40px;
    border: 2px solid #a855f7;
    border-radius: 20px;
    box-shadow: 0 0 25px #a855f7;
    background: rgba(20, 0, 40, 0.6);
    backdrop-filter: blur(8px);
}

h1 {
    color: #c084fc;
    margin-bottom: 20px;
}

.highlight {
    color: #a855f7;
    font-weight: bold;
}

/* ducks */
.duck {
    width: 90px;
    height: 90px;
    position: absolute;
    border-radius: 15px;
    border: 2px solid #a855f7;
    box-shadow: 0 0 15px #a855f7;
}

/* corners */
.tl { top: 10px; left: 10px; }
.tr { top: 10px; right: 10px; }
.bl { bottom: 10px; left: 10px; }
.br { bottom: 10px; right: 10px; }

/* floating animation */
.float {
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<!-- ducks -->
<img class="duck tl float" src="https://placekitten.com/100/100">
<img class="duck tr float" src="https://placekitten.com/101/100">
<img class="duck bl float" src="https://placekitten.com/102/100">
<img class="duck br float" src="https://placekitten.com/103/100">

<!-- main content -->
<div class="card">
    <h1>🐤 My Duck Profile</h1>

    <p>Discord: <span class="highlight">duckbot_</span></p>
    <p>Roblox: <span class="highlight">jeef87604</span></p>

    <p style="margin-top:20px; opacity:0.6; font-size:12px;">
        Built while learning HTML + CSS
    </p>
</div>

</body>
</html>
